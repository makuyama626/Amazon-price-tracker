<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Amazon 底値トラッカー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF9900">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="底値トラッカー">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{--or:#FF9900;--gr:#2E7D32;--sf:#fff;--sf2:#f7f7f5;--sf3:#f0ede8;--bd:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.06);--tx:#1a1a1a;--tx2:#666;--tx3:#999;--r:12px;--rsm:8px}
@media(prefers-color-scheme:dark){:root{--sf:#1c1c1e;--sf2:#2c2c2e;--sf3:#3a3a3c;--bd:rgba(255,255,255,.12);--bd2:rgba(255,255,255,.06);--tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--sf2);color:var(--tx);padding:70px 14px 80px;min-height:100dvh}
.nav{position:fixed;top:0;left:0;right:0;background:var(--sf);border-bottom:.5px solid var(--bd);padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;z-index:100}
.logo{width:30px;height:30px;background:#FF9900;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.nav-title{font-size:16px;font-weight:600}
.nav-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.bell{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--sf2);border:.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--tx3)}
.bell.on{background:rgba(255,153,0,.1);color:#FF9900}
.tabs{display:flex;background:var(--sf3);border-radius:8px;padding:3px;gap:2px;margin-bottom:14px}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:13px;font-weight:500;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--tx2)}
.tab.on{background:var(--sf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--sf);border-radius:8px;padding:10px 8px;text-align:center;border:.5px solid var(--bd2)}
.sv{font-size:22px;font-weight:700}
.sl{font-size:10px;color:var(--tx3);margin-top:2px}
.card{background:var(--sf);border-radius:12px;padding:14px;margin-bottom:10px;border:.5px solid var(--bd2);position:relative}
.card.al{border-color:#FF9900;background:rgba(255,153,0,.05)}
.cn{font-size:13px;font-weight:600;margin-bottom:8px;padding-right:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.pr{font-size:22px;font-weight:700}
.pr.lo{color:#2E7D32}
.bdg{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;display:inline-block}
.ba{background:#FF9900;color:#fff}
.bw{background:#FFF3E0;color:#E65100}
.bg{background:#E8F5E9;color:#2E7D32}
.bn{background:var(--sf2);color:var(--tx2);border:.5px solid var(--bd)}
.btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;border:.5px solid var(--bd);background:var(--sf2);color:var(--tx);cursor:pointer}
.bto{background:#FF9900;color:#fff;border-color:#FF9900}
.bbl{display:block;width:100%;padding:12px;font-size:15px;font-weight:600;border-radius:12px;margin-top:6px;text-align:center;cursor:pointer;border:none}
.del{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--sf2);border:.5px solid var(--bd);cursor:pointer;font-size:13px;color:var(--tx2)}
.fi{margin-bottom:10px}
.fi label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fi input{width:100%;padding:10px 12px;border:.5px solid var(--bd);border-radius:8px;font-size:15px;background:var(--sf);color:var(--tx);outline:none;-webkit-appearance:none}
.fi input:focus{border-color:#FF9900}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.emp{text-align:center;padding:40px;color:var(--tx2);font-size:14px;line-height:1.8}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:.5px solid var(--bd);padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));display:flex;z-index:100}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px}
.bi svg{width:22px;height:22px;fill:var(--tx3)}
.bi span{font-size:10px;color:var(--tx3);font-weight:500}
.bi.on svg{fill:#FF9900}
.bi.on span{color:#FF9900}
.fls{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fl{font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--bd);background:none;cursor:pointer;color:var(--tx2);font-weight:500}
.fl.on{background:#FF9900;color:#fff;border-color:#FF9900}
.st{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.pg{height:4px;background:var(--sf3);border-radius:2px;overflow:hidden;margin-bottom:8px}
.pgf{height:100%;border-radius:2px;transition:width .4s}
.sb{background:#FF9900;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.mt{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.nb{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.nb svg{width:24px;height:24px;fill:#FF9900;flex-shrink:0}
.nb-t{font-size:13px;flex:1;line-height:1.5}
.nb-t b{display:block;font-size:14px;margin-bottom:2px}
.price-hint{font-size:11px;color:var(--tx3);margin-top:2px}
</style>
</head>
<body>
<div class="nav">
  <div class="logo">&#9660;</div>
  <div><div class="nav-title">底値トラッカー</div><div class="nav-sub" id="nav-sub">購入履歴481件 · 価格実績データ付き</div></div>
  <button class="bell" id="bell" onclick="toggleNotif()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </button>
</div>
<div class="tabs">
  <button class="tab on" onclick="showTab('t',0)">監視中</button>
  <button class="tab" onclick="showTab('h',1)">履歴から追加</button>
  <button class="tab" onclick="showTab('a',2)">手動追加</button>
</div>
<div id="pt">
  <div id="sum" class="sum" style="display:none">
    <div class="sc"><div class="sv" id="st">0</div><div class="sl">監視中</div></div>
    <div class="sc"><div class="sv" id="sal" style="color:#FF9900">0</div><div class="sl">底値近く</div></div>
    <div class="sc"><div class="sv" id="ssv" style="font-size:14px">&#165;0</div><div class="sl">節約可能額</div></div>
  </div>
  <div class="st">監視リスト</div>
  <div id="pl"></div>
</div>
<div id="ph" style="display:none">
  <div id="na"></div>
  <div class="st">定期購入品（実績価格データ付き）</div>
  <div class="fls">
    <button class="fl on" onclick="filterH('all',this)">すべて</button>
    <button class="fl" onclick="filterH('monthly',this)">月1回以上</button>
    <button class="fl" onclick="filterH('bi',this)">2〜3ヶ月</button>
    <button class="fl" onclick="filterH('half',this)">半年以内</button>
  </div>
  <div id="hl"></div>
</div>
<div id="pa" style="display:none">
  <div class="card">
    <div class="st" style="margin-bottom:12px">AmazonのURLから追加</div>
    <div class="fi">
      <label>Amazon商品ページのURL</label>
      <input id="iu" type="url" inputmode="url" placeholder="https://www.amazon.co.jp/dp/B0XXXXXXXX" style="-webkit-appearance:none" oninput="extractAsin(this.value)">
      <div id="asin-badge" style="display:none;margin-top:6px;font-size:12px;background:var(--sf3);padding:5px 10px;border-radius:8px;color:var(--tx2)"></div>
    </div>
    <div class="fi"><label>商品名</label><input id="in" type="text" placeholder="例：ミンティア ドライハード 10個入"></div>
    <div class="fi">
      <label>現在の価格（円）</label>
      <div style="position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx2)">&#165;</span>
        <input id="ip" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" style="width:100%;padding:11px 12px 11px 26px;font-size:18px;font-weight:600;border:.5px solid var(--bd);border-radius:10px;background:var(--sf);color:var(--tx);-webkit-appearance:none;outline:none">
      </div>
    </div>
    <input id="ia" type="hidden">
    <button class="btn bto bbl" onclick="addM()" style="margin-top:4px">+ 追加する</button>
  </div>
</div></div>
<div class="bnav">
  <div class="bi on" id="b0" onclick="showTab('t',0)"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg><span>監視</span></div>
  <div class="bi" id="b1" onclick="showTab('h',1)"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg><span>履歴</span></div>
  <div class="bi" id="b2" onclick="showTab('a',2)"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>追加</span></div>
</div>
<div class="toast" id="toast"></div>
<script>
var KEY='amzn_v2';
// 購入履歴481件から算出した実績価格データ
// minPrice=過去最安値, avgPrice=平均購入価格, suggestTarget=推奨底値目安(平均の88%)
var DATA=[
  {asin:'B0019GXU4M',name:'デルモンテ 食塩無添加トマトジュース 900g×12',count:13,gap:27,minPrice:3218,avgPrice:3218,suggestTarget:2832},
  {asin:'B01MSSW5SI',name:'DHC 醗酵黒セサミン スタミナ 30日分',count:14,gap:46,minPrice:1174,avgPrice:1174,suggestTarget:1033},
  {asin:'B007KFMAHY',name:'アサヒ ミンティア ドライハード 50粒×10個',count:2,gap:45,minPrice:1030,avgPrice:1030,suggestTarget:906},
  {asin:'B0B5CBKZ25',name:'by Amazon 炭酸水 レモン 500ml×24本',count:2,gap:42,minPrice:1332,avgPrice:1332,suggestTarget:1172},
  {asin:'B01FDKXSIW',name:'グミサプリ 鉄 葉酸 60粒 30日分',count:3,gap:29,minPrice:1111,avgPrice:1110,suggestTarget:977},
  {asin:'B0DTV3N7V9',name:'福咲新堂 特選だし 完全無添加 あご入り 200g',count:4,gap:58,minPrice:1990,avgPrice:1990,suggestTarget:1751},
  {asin:'B00KPRNWSA',name:'高千穂漢方 発芽はとむぎ茶 業務用 88P',count:9,gap:72,minPrice:1064,avgPrice:1064,suggestTarget:936},
  {asin:'B07G736ZRK',name:'Bragg アップルサイダービネガー 946ml',count:2,gap:77,minPrice:1749,avgPrice:1749,suggestTarget:1539},
  {asin:'B01FDLEHAY',name:'グミサプリ ルテイン 60粒 30日分',count:4,gap:84,minPrice:1601,avgPrice:1610,suggestTarget:1417},
  {asin:'B079Y6SGJ4',name:'ザバス ホエイプロテイン100 リッチショコラ 980g',count:2,gap:92,minPrice:4161,avgPrice:4161,suggestTarget:3662},
  {asin:'B07B66RX3L',name:'GUM 歯周プロケア ソフトピック 30本×4個',count:3,gap:97,minPrice:1246,avgPrice:1246,suggestTarget:1096},
  {asin:'B07CS34XKQ',name:'カウブランド 無添加メイク落とし ミルク×3',count:2,gap:117,minPrice:1368,avgPrice:1368,suggestTarget:1204},
  {asin:'B07B3BXZ43',name:'ムカデハンター 2個入り',count:5,gap:118,minPrice:502,avgPrice:502,suggestTarget:442},
  {asin:'B0778X3QZ1',name:'リーチ ウルトラクリーンフロス 27m',count:4,gap:118,minPrice:446,avgPrice:446,suggestTarget:392},
  {asin:'B01B74CAB4',name:'ディアナチュラ ビタミンC 120粒 60日分',count:7,gap:129,minPrice:354,avgPrice:354,suggestTarget:312},
  {asin:'B088RN1K1Q',name:'ディアナチュラ 亜鉛 90粒 90日分',count:3,gap:138,minPrice:700,avgPrice:1405,suggestTarget:1236},
  {asin:'B07ZGV1BKD',name:'めぐりズム ホットアイマスク ラベンダー 16枚',count:2,gap:142,minPrice:3241,avgPrice:3241,suggestTarget:2852},
  {asin:'B00KXU3FI6',name:'UCC 職人の珈琲 ドリップ 120杯',count:2,gap:177,minPrice:3731,avgPrice:3731,suggestTarget:3283},
  {asin:'B07N1RNJMY',name:'カゴメ トマトジュース 食塩無添加 1L×6本',count:2,gap:10,minPrice:1899,avgPrice:1899,suggestTarget:1671},
  {asin:'B091ZK7XH3',name:'Neutrogena ノルウェーフォーミュラ ボディミルク 450ml',count:3,gap:120,minPrice:1112,avgPrice:1112,suggestTarget:979},
  {asin:'B09TWB4CNZ',name:'NEC用 互換トナーカートリッジ 4色セット',count:2,gap:150,minPrice:10820,avgPrice:10820,suggestTarget:9522},
  {asin:'B0BVBKQ68F',name:'訳あり ほしいも 900g 茨城産 無添加',count:2,gap:71,minPrice:1980,avgPrice:1980,suggestTarget:1742},
  {asin:'B00K0FGEJ6',name:'高儀 EARTH MAN バンドソー用 替ブレード',count:3,gap:174,minPrice:1553,avgPrice:2840,suggestTarget:2499},
  {asin:'B07HB1Z4GQ',name:'サンペレグリノ 炭酸水 500ml×24本',count:2,gap:120,minPrice:1658,avgPrice:1658,suggestTarget:1459}
];
var prods=[],hf='all',notifOn=false;

window.addEventListener('DOMContentLoaded',function(){
  try{prods=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){prods=[];}
  window._hidden=new Set(JSON.parse(localStorage.getItem(KEY+'_h')||'[]'));
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
  if('Notification' in window) notifOn=Notification.permission==='granted';
  updateBell();render();renderH();
});

function save(){localStorage.setItem(KEY,JSON.stringify(prods));}
function hideItem(asin){
  window._hidden=window._hidden||new Set();
  window._hidden.add(asin);
  localStorage.setItem(KEY+'_h',JSON.stringify([...window._hidden]));
  renderH();
  toast('非表示にしました');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2600);
}

function showTab(name,idx){
  document.getElementById('pt').style.display=name==='t'?'':'none';
  document.getElementById('ph').style.display=name==='h'?'':'none';
  document.getElementById('pa').style.display=name==='a'?'':'none';
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].className='tab'+(i===idx?' on':'');
  for(var i=0;i<3;i++) document.getElementById('b'+i).className='bi'+(i===idx?' on':'');
}

function toggleNotif(){
  if(!('Notification' in window)){toast('このブラウザは通知未対応');return;}
  if(Notification.permission==='denied'){toast('設定→Safari→通知から許可してください');return;}
  if(notifOn){notifOn=false;updateBell();toast('通知をオフにしました');renderH();return;}
  Notification.requestPermission().then(function(p){
    notifOn=p==='granted';updateBell();
    toast(notifOn?'通知をオンにしました':'通知の許可が必要です');
    renderH();
  });
}

function updateBell(){
  var b=document.getElementById('bell');
  if(b) b.className='bell'+(notifOn?' on':'');
}

function sendNotif(title,body){
  if(!notifOn) return;
  navigator.serviceWorker&&navigator.serviceWorker.ready.then(function(r){
    r.showNotification(title,{body:body,icon:'./icon-192.png',tag:'price-alert',renotify:true});
  });
}

function filterH(f,btn){
  hf=f;
  var fls=document.querySelectorAll('.fl');
  for(var i=0;i<fls.length;i++) fls[i].className='fl';
  btn.className='fl on';
  renderH();
}

function renderH(){
  var na=document.getElementById('na');
  if(!('Notification' in window)){
    na.innerHTML='';
  } else if(Notification.permission==='denied'){
    na.innerHTML='<div class="nb"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><div class="nb-t"><b>通知がブロックされています</b>設定→Safari→通知から許可してください</div></div>';
  } else if(!notifOn){
    na.innerHTML='<div class="nb"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><div class="nb-t"><b>プッシュ通知を有効にする</b>右上のベルをタップして許可</div></div>';
  } else {
    na.innerHTML='<div class="nb"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg><div class="nb-t"><b>通知 <span style="background:#E8F5E9;color:#2E7D32;padding:2px 8px;border-radius:20px;font-size:11px">オン</span></b>底値近くになったら通知します</div></div>';
  }

  var tracked={};
  for(var i=0;i<prods.length;i++) tracked[prods[i].asin]=true;

  var items=[];
  var seen={};
  for(var i=0;i<DATA.length;i++){
    if(!seen[DATA[i].asin]&&!(window._hidden||new Set()).has(DATA[i].asin)){seen[DATA[i].asin]=true;items.push(DATA[i]);}
  }
  if(hf==='monthly') items=items.filter(function(x){return x.gap<=35;});
  else if(hf==='bi') items=items.filter(function(x){return x.gap>35&&x.gap<=90;});
  else if(hf==='half') items=items.filter(function(x){return x.gap>90;});
  items.sort(function(a,b){return a.gap-b.gap;});

  var hl=document.getElementById('hl');
  if(!items.length){hl.innerHTML='<div class="emp">該当なし</div>';return;}

  var html='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var t=tracked[item.asin];
    var gc=item.gap<=35?'ba':item.gap<=90?'bw':'bg';
    var gl=item.gap<=35?'月1回以上':item.gap<=90?'2〜3ヶ月':'半年以内';
    var priceInfo='';
    if(item.avgPrice>0){
      priceInfo='<div class="price-hint">平均購入価格 &#165;'+item.avgPrice.toLocaleString()+' / 最安値 &#165;'+item.minPrice.toLocaleString()+'</div>';
    }
    var btn=t
      ? '<span style="color:#2E7D32;font-size:12px;font-weight:600">&#10003; 監視中</span>'
      : '<button class="btn bto" style="font-size:12px;padding:6px 12px" onclick="addH('+i+')">+ 追加</button>';
    html+='<div class="card" style="position:relative">'+'<button data-asin="'+item.asin+'" onclick="hideItem(this.dataset.asin)" style="position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:var(--sf3);border:.5px solid var(--bd);cursor:pointer;font-size:15px;color:var(--tx2);line-height:1">&times;</button>'+'<div class="cn" style="padding-right:32px">'+item.name+'</div>'+priceInfo+'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:8px"><div style="display:flex;gap:5px;flex-wrap:wrap"><span class="bdg '+gc+'">'+gl+'</span><span class="bdg bn">約'+item.gap+'日ごと</span><span class="bdg bn">'+item.count+'回購入</span></div>'+btn+'</div></div>';
  }
  hl.innerHTML=html;
  window._filteredItems=items;
}

function addH(idx){
  var items=window._filteredItems;
  if(!items||!items[idx]) return;
  var item=items[idx];
  for(var i=0;i<prods.length;i++){if(prods[i].asin===item.asin){toast('すでに監視中');return;}}
  // 推奨底値目安を初期値として設定
  var suggestTarget=item.suggestTarget||0;
  prods.unshift({
    id:Date.now(),name:item.name,asin:item.asin,
    ph:[{price:item.avgPrice||0,date:new Date().toISOString()}],
    target:suggestTarget,
    lowestEver:item.minPrice||0,
    gap:item.gap,
    minPrice:item.minPrice||0,
    avgPrice:item.avgPrice||0
  });
  save();render();renderH();showTab('t',0);
  if(suggestTarget>0){
    toast('追加しました。底値目安 &#165;'+suggestTarget.toLocaleString()+' を自動設定');
  } else {
    toast('追加しました。価格・底値を設定してください');
  }
}

function analyzeScreenshot(input){
  var file=input.files[0];
  if(!file) return;
  var st=document.getElementById('ss-status');
  var label=document.getElementById('ss-label');
  st.style.display='block';
  st.textContent='解析中... 少しお待ちください';
  label.style.opacity='0.5';
  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    var mediaType=file.type||'image/jpeg';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
          {type:'text',text:'このAmazonの商品ページのスクリーンショットから以下を抽出してください。JSONのみで返答してください（他のテキストなし）:\n{"name":"商品名（短く50文字以内）","asin":"ASIN10桁（URLまたはページ内から）","price":数値（円、税込現在価格、数値のみ）}\nASINが見つからない場合はnull、価格が見つからない場合は0にしてください。'}
        ]}]
      })
    })
    .then(function(r){return r.json();})
    .then(function(data){
      var text=data.content&&data.content[0]&&data.content[0].text||'{}';
      var clean=text.replace(/```json|```/g,'').trim();
      var result=JSON.parse(clean);
      if(result.name) document.getElementById('in').value=result.name;
      if(result.price&&result.price>0) document.getElementById('ip').value=result.price;
      if(result.asin&&result.asin!=='null') document.getElementById('ia').value=result.asin;
      st.textContent='✅ 解析完了！内容を確認して追加ボタンを押してください';
      st.style.color='#2E7D32';
      label.style.opacity='1';
      input.value='';
    })
    .catch(function(err){
      st.textContent='⚠️ 解析失敗。手動で入力してください';
      st.style.color='#e53935';
      label.style.opacity='1';
      input.value='';
    });
  };
  reader.readAsDataURL(file);
}
function extractAsin(url){
  // AmazonのURLパターンからASINを抽出
  // パターン: /dp/XXXXXXXXXX  /gp/product/XXXXXXXXXX  ?asin=XXXXXXXXXX
  var m = url.match(/\/dp\/([A-Z0-9]{10})/i) ||
           url.match(/\/gp\/product\/([A-Z0-9]{10})/i) ||
           url.match(/[?&]asin=([A-Z0-9]{10})/i) ||
           url.match(/\/([A-Z0-9]{10})(?:[\/?#]|$)/);
  var badge = document.getElementById('asin-badge');
  var iaEl = document.getElementById('ia');
  if(m && m[1]){
    var asin = m[1].toUpperCase();
    iaEl.value = asin;
    badge.style.display = 'block';
    badge.innerHTML = 'ASIN: <b>' + asin + '</b> ✅';
    badge.style.color = '#2E7D32';
  } else {
    iaEl.value = '';
    if(url.length > 10){
      badge.style.display = 'block';
      badge.innerHTML = 'ASINが見つかりません';
      badge.style.color = '#e53935';
    } else {
      badge.style.display = 'none';
    }
  }
}
function addM(){
  var n=document.getElementById('in').value.trim();
  var p=parseFloat(document.getElementById('ip').value);
  var a=document.getElementById('ia').value.trim();
  if(!n){toast('商品名を入力してください');return;}
  if(!p||p<=0){toast('価格を入力してください');return;}
  var t=p;
  prods.unshift({id:Date.now(),name:n,asin:a,ph:[{price:p,date:new Date().toISOString()}],target:t,lowestEver:p});
  save();render();
  document.getElementById('iu').value='';
  document.getElementById('in').value='';
  document.getElementById('ip').value='';
  document.getElementById('ia').value='';
  var b=document.getElementById('asin-badge');if(b)b.style.display='none';
  showTab('t',0);toast('追加しました！');
}

function del(id){
  if(!confirm('削除しますか？')) return;
  prods=prods.filter(function(p){return p.id!==id;});
  save();render();renderH();toast('削除しました');
}

function setPrice(id){
  var p=prods.find(function(x){return x.id===id;});
  if(!p) return;
  var defPrice=p.ph[0].price||p.avgPrice||'';
  var defTarget=p.target||p.suggestTarget||Math.round((p.avgPrice||0)*0.88)||'';
  var price=parseFloat(prompt('現在の価格を入力（&#165;）\n\n参考：平均購入価格 &#165;'+(p.avgPrice||0).toLocaleString(),defPrice));
  if(isNaN(price)||price<=0) return;
  var target=parseFloat(prompt('底値目安を入力（&#165;）\n\n参考：過去最安値 &#165;'+(p.minPrice||0).toLocaleString()+'\n推奨目安 &#165;'+(p.target||Math.round(price*0.88)).toLocaleString(),defTarget));
  if(isNaN(target)||target<=0) return;
  p.ph[0]={price:price,date:new Date().toISOString()};
  p.target=target;p.lowestEver=Math.min(p.lowestEver||price,price,p.minPrice||price);
  save();render();toast('設定しました');
}

function checkPrice(id){
  var p=prods.find(function(x){return x.id===id;});
  if(!p) return;
  var prev=p.ph&&p.ph.length>0?p.ph[0].price:0;
  // カスタム数値入力ダイアログを表示
  showPriceInput(id,prev);
}
function showPriceInput(id,prev){
  var old=document.getElementById('_pd');
  if(old) old.remove();
  var p=prods.find(function(x){return x.id===id;});
  if(!p) return;
  var minDate='';
  if(p.minPriceDate){
    var md=new Date(p.minPriceDate);
    minDate=' ('+md.getFullYear()+'年'+(md.getMonth()+1)+'月'+md.getDate()+'日)';
  }
  // overlay
  var ov=document.createElement('div');
  ov.id='_pd';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  // card
  var card=document.createElement('div');
  card.style.cssText='background:var(--sf);border-radius:16px;padding:24px;width:100%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.3)';
  // name label
  var nm=document.createElement('div');
  nm.style.cssText='font-size:13px;color:var(--tx2);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
  nm.textContent=p.name.substring(0,30);
  card.appendChild(nm);
  // title
  var tl=document.createElement('div');
  tl.style.cssText='font-size:15px;font-weight:600;margin-bottom:16px';
  tl.textContent='現在価格を入力';
  card.appendChild(tl);
  // min price info
  if(p.minPrice>0){
    var mi=document.createElement('div');
    mi.style.cssText='font-size:12px;color:var(--tx3);margin-bottom:12px';
    mi.textContent='過去購入最安値: ¥'+p.minPrice.toLocaleString()+minDate;
    card.appendChild(mi);
  }
  // input wrapper
  var iw=document.createElement('div');
  iw.style.cssText='position:relative;margin-bottom:16px';
  var yen=document.createElement('span');
  yen.style.cssText='position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tx2)';
  yen.textContent='¥';
  var inp=document.createElement('input');
  inp.id='_pi';
  inp.type='number';
  inp.inputMode='numeric';
  inp.pattern='[0-9]*';
  inp.placeholder='0';
  inp.value=prev||'';
  inp.style.cssText='width:100%;padding:12px 12px 12px 28px;font-size:20px;font-weight:600;border:.5px solid var(--bd);border-radius:10px;background:var(--sf);color:var(--tx);-webkit-appearance:none;outline:none;text-align:right';
  iw.appendChild(yen);
  iw.appendChild(inp);
  card.appendChild(iw);
  // buttons
  var btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:8px';
  var cancel=document.createElement('button');
  cancel.style.cssText='flex:1;padding:12px;border-radius:10px;border:.5px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:15px;cursor:pointer';
  cancel.textContent='キャンセル';
  cancel.onclick=function(){ov.remove();};
  var ok=document.createElement('button');
  ok.style.cssText='flex:1;padding:12px;border-radius:10px;border:none;background:#FF9900;color:#fff;font-size:15px;font-weight:600;cursor:pointer';
  ok.textContent='OK';
  ok.onclick=function(){_submitPrice(id);};
  btns.appendChild(cancel);
  btns.appendChild(ok);
  card.appendChild(btns);
  ov.appendChild(card);
  document.body.appendChild(ov);
  setTimeout(function(){inp.focus();inp.select();},100);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter') _submitPrice(id);});
}

function _submitPrice(id){
  var inp=document.getElementById('_pi');
  if(!inp) return;
  var np=parseFloat(inp.value);
  var overlay=document.getElementById('_pd');
  if(overlay) overlay.remove();
  if(isNaN(np)||np<=0){toast('正しい価格を入力してください');return;}
  var p=prods.find(function(x){return x.id===id;});
  if(!p) return;
  var old=p.ph&&p.ph.length>0?p.ph[0].price:np;
  p.ph=p.ph||[];
  var now=new Date().toISOString();
  p.ph.unshift({price:np,date:now});
  if(p.ph.length>30) p.ph=p.ph.slice(0,30);
  var prevMin=p.minPrice||0;
  if(prevMin===0||np<prevMin){
    p.minPrice=np;
    p.minPriceDate=now;
    if(np<(p.target||np)) p.target=np;
    setTimeout(function(){
      toast('🎉 新記録！過去購入最安値更新 ¥'+np.toLocaleString());
      sendNotif('新記録！','「'+p.name.substring(0,20)+'」過去購入最安値更新 ¥'+np.toLocaleString());
    },300);
  } else if(p.target>0&&np<=p.target*1.05){
    setTimeout(function(){
      toast('底値近くです！🎉');
      sendNotif('底値アラート','「'+p.name.substring(0,20)+'」底値近くです！');
    },600);
  }
  p.lowestEver=p.minPrice||np;
  save();render();
  var d=np-old;
  toast('¥'+np.toLocaleString()+(old&&old!==np?' ('+(d>0?'+':'')+d.toLocaleString()+')':''));
}

function getStatus(p){
  if(!p.target||!p.ph[0].price) return {label:'価格未設定',cls:'bn',al:false};
  var r=p.ph[0].price/p.target;
  if(r<=1) return {label:'底値！',cls:'ba',al:true};
  if(r<=1.05) return {label:'底値近く',cls:'ba',al:true};
  if(r<=1.15) return {label:'要チェック',cls:'bw',al:false};
  return {label:'通常価格',cls:'bg',al:false};
}

function fmtDate(iso){
  var d=new Date(iso);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+(('0'+d.getMinutes()).slice(-2));
}

function render(){
  var list=document.getElementById('pl');
  var sumEl=document.getElementById('sum');
  if(!prods.length){
    list.innerHTML='<div class="emp">&#128230;<br><br>「履歴から追加」タブで<br>定期購入品を追加しましょう</div>';
    sumEl.style.display='none';return;
  }
  sumEl.style.display='grid';
  var ac=0,ts=0;
  var html='';
  for(var i=0;i<prods.length;i++){
    var p=prods[i];
    var cur=p.ph[0].price;
    var st=getStatus(p);
    if(st.al){ac++;if(p.target>0&&cur>p.target){ts+=cur-p.target;}}
    var ns=!cur||!p.target;
    var bp=ns?0:Math.max(5,Math.min(100,Math.round((1-(cur-p.target)/(cur*0.5))*100)));
    var bc=!cur?'#ccc':cur<=p.target?'#2E7D32':cur<=p.target*1.05?'#FF9900':'#ddd';
    var al=p.asin?'<a href="https://www.amazon.co.jp/dp/'+p.asin+'" target="_blank" style="font-size:11px;color:#0070c9;text-decoration:none">Amazon&#8599;</a>':'';
    var gb=p.gap?'<span class="bdg bn">約'+p.gap+'日ごと</span>':'';
    // 価格根拠の表示
    var priceBase='';
    if(p.minPrice>0){
      priceBase='<div class="price-hint">過去最安値 &#165;'+p.minPrice.toLocaleString()+' / 平均 &#165;'+(p.avgPrice||0).toLocaleString()+'</div>';
    }
    var body='';
    if(ns){
      var hint='';
      if(p.avgPrice>0) hint=' （参考：平均 &#165;'+p.avgPrice.toLocaleString()+'）';
      body='<button class="sb" onclick="setPrice('+p.id+')">価格・底値を設定する →'+hint+'</button>';
    } else {
      body='<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px"><div class="pr'+(cur<=p.target?' lo':'')+'" >&#165;'+cur.toLocaleString()+'</div><div><div style="font-size:10px;color:var(--tx3)">底値目安</div><div style="font-size:13px;font-weight:600;color:var(--tx2)">&#165;'+p.target.toLocaleString()+'</div></div></div>'+priceBase+'<div class="pg"><div class="pgf" style="width:'+bp+'%;background:'+bc+'"></div></div>';
    }
    html+='<div class="card'+(st.al?' al':'')+'"><button class="del" onclick="del('+p.id+')">&#10005;</button><div class="cn">'+p.name+'</div>'+body+'<div class="mt"><div style="display:flex;gap:5px;flex-wrap:wrap"><span class="bdg '+st.cls+'">'+st.label+'</span>'+gb+al+'</div>'+(!ns?'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--tx3)">'+fmtDate(p.ph[0].date)+'</span><button class="btn" style="font-size:12px;padding:5px 10px" onclick="checkPrice('+p.id+')">確認</button></div>':'')+'</div></div>';
  }
  list.innerHTML=html;
  document.getElementById('st').textContent=prods.length;
  document.getElementById('sal').textContent=ac;
  document.getElementById('ssv').textContent='&#165;'+ts.toLocaleString();
}
</script>
</body>
</html>
